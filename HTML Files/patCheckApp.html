<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8">
    <title>Check Appointments</title>

    <script src="script.js"></script>

  </head>
  <body>
    <div class="centered_div">
      <form name="checkAppointments">
        <table>
          <tr>
            <td>
              <p class="checkAppP">
                Enter your e-mail address below and we will send you an e-mail
                with all your appointments, if any. However you can request an
                appointment by pressing the button below.
              </p>
            </td>
          </tr>
          <tr>
            <td>
              <input type="email" name="emailAdress" class="patEmailCheck" placeholder="contact@dentalmed.com">
            </td>
          </tr>
        </table>
        <table>
          <tr>
            <td>
              <button class="button patCheckAppBtn" onclick="return validateForm()">Check My Appointments</button>
            </td>
          </tr>
        </table>
      </form>
      <a href="requestAppointment.html">
        <button class="button patRequestAppBtn">Request New Appointment</button>
      </a>
    </div>
  </body>
</html>
